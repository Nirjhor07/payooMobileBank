<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo Home Page</title>
    <!-- Adding Fav icon top of the title -->
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon" />

    <!-- Connecting daisyUi & tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- daisyUi Theme -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
      rel="stylesheet"
      type="text/css"
    />

    <!-- Adding font Awesome CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Adding google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Adding universal font design for the whole doccument -->
    <style>
      * {
        font-family: "Outfit", sans-serif;
      }
    </style>
  </head>

  <body class="max-w-md min-h-screen bg-base-200 mx-auto">
    <header
      id="header"
      class="border-b-2 border-gray-300 sticky top-0 z-10 bg-base-200"
    >
      <nav class="w-11/12 mx-auto p-5 flex items-center justify-between">
        <div class="flex">
          <div class="w-[60px]">
            <img src="assets/logo.png" alt="" srcset="" />
          </div>
          <div>
            <p class="text-2xl text-neutral font-bold">
              $<span id="current-balance">45000</span>
            </p>
            <p class="text-neutral/50">Available Balance</p>
          </div>
        </div>

        <div>
          <a href="index.html" class="btn">
            <i class="fa-solid fa-arrow-right-from-bracket"></i>log Out
          </a>
        </div>
      </nav>
    </header>

    <section id="welcome" class="w-11/12 mx-auto p-3.5 space-y-2">
      <h1 class="text-2xl text-neutral font-bold">
        Welcome to Pay<span class="text-blue-400">oo</span>
      </h1>
      <p class="text-neutral/50">
        Enjoy easy and convenient financial services with us. Cashout charge is
        low and
      </p>

      <div class="buttons grid grid-cols-3 gap-4 mt-3">
        <!-- btn-1 -->
        <button class="btn btn-primary btn-soft flex-col h-full p-5">
          <img src="assets/opt-1.png" alt="" />
          <h1>Add Money</h1>
        </button>
        <!-- btn-2 -->
        <button class="btn btn-primary btn-soft flex-col h-full p-5">
          <img src="assets/opt-2.png" alt="" />
          <h1>Cash Out</h1>
        </button>
        <!-- btn-3 -->
        <button class="btn btn-primary btn-soft flex-col h-full p-5">
          <img src="assets/opt-3.png" alt="" />
          <h1>TransferMoney</h1>
        </button>
        <!-- btn-4 -->
        <button class="btn btn-primary btn-soft flex-col h-full p-5">
          <img src="assets/opt-4.png" alt="" />
          <h1>Get Bonus</h1>
        </button>
        <!-- btn-5 -->
        <button class="btn btn-primary btn-soft flex-col h-full p-5">
          <img src="assets/opt-5.png" alt="" />
          <h1>Pay Bill</h1>
        </button>
        <!-- btn-6 -->
        <button class="btn btn-primary btn-soft flex-col h-full p-5">
          <img src="assets/opt-6.png" alt="" />
          <h1>Transactions</h1>
        </button>
      </div>
    </section>

    <section id="cashOut-div" class="w-11/12 mx-auto p-3.5 space-y-2 hidden">
      <p class="text-2xl text-neutral font-bold">CashOut</p>

      <div
        class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl mx-auto mt-8 mb-10"
      >
        <div class="card-body">
          <fieldset class="fieldset">
            <label class="label font-bold text-xl text-neutral"
              >Agent Number</label
            >
            <input
              id="input-agent-num"
              type="text"
              maxlength="11"
              minlength="11"
              class="input rounded-full bg-base-200"
              placeholder="Enter your 11 digit Agent number"
            />

            <label class="label font-bold text-xl text-neutral">Amount</label>
            <input
              id="input-amount-num"
              type="number"
              class="input rounded-full bg-base-200"
              placeholder="Enter cashout amount"
            />

            <label class="label font-bold text-xl text-neutral"
              >Pin Number</label
            >
            <input
              id="widraw-pin"
              type="text"
              maxlength="4"
              minlength="4"
              class="input rounded-full bg-base-200"
              placeholder="Enter your 4 pin code"
            />

            <button id="Widraw-btn" class="btn btn-primary rounded-full mt-4">
              Widraw Money
            </button>
          </fieldset>
        </div>
      </div>
    </section>

    <section id="addMoneyDiv" class="w-11/12 mx-auto p-3.5 space-y-3">
      <p class="text-2xl text-neutral font-bold">Add Money</p>

      <div
        class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl mx-auto mt-8 mb-10"
      >
        <div class="card-body">
          <fieldset class="fieldset">
            <label class="label text-xl text-neutral">Select a bank</label>
            <select id="addMoneyBankAccount" class="select rounded-full bg-base-200">
              <option disabled selected>Select a bank</option>
              <option value="Islami Bank">Islami Bank</option>
              <option value="City Bank">City Bank</option>
              <option value="Brac Bank">Brac Bank</option>
            </select>
            <br />
            <label class="label font-bold text-xl text-neutral"
              >Bank Account Number</label
            >
            <input
              id="addMoneyBankAccountNumber"
              type="text"
              maxlength="11"
              minlength="11"
              class="input rounded-full bg-base-200"
              placeholder="Enter your 11 digit bank account number"
            />

            <label class="label font-bold text-xl text-neutral">Amount</label>
            <input
              id="addMoneyAmount"
              type="number"
              class="input rounded-full bg-base-200"
              placeholder="Enter Add Money amount"
            />

            <label class="label font-bold text-xl text-neutral"
              >Pin Number</label
            >
            <input
              id="addMoney-pin"
              type="text"
              maxlength="4"
              minlength="4"
              class="input rounded-full bg-base-200"
              placeholder="Enter your 4 pin code"
            />

            <button id="addMoney-btn" class="btn btn-primary rounded-full mt-4">
              Add Money
            </button>
          </fieldset>
        </div>
      </div>
    </section>

    <script src="js scripts/machine.js"></script>
    <script src="js scripts/cashOut.js"></script>
    <script src="js scripts/addMoney.js"></script>
  </body>
</html>
